name: FFUF Fuzzing Pipeline

on:
  workflow_dispatch:
    inputs:
      domains:
        description: 'Domains separated by / (e.g., f.com/j.com/x.com) - Skipped if Direct URLs are provided'
        required: false
        type: string
      live_urls:
        description: 'Paste Direct Live URLs here to SKIP Subfinder/Httpx (e.g., http://sub.jf.comhttps://dub.jf.com)'
        required: false
        type: string
      file_path:
        description: 'Path to a domains .txt file in repo (one per line)'
        required: false
        type: string
      wordlist:
        description: 'Path to the wordlist in repo (e.g., test.txt)'
        required: true
        default: 'test.txt'
      extensions:
        description: 'Extensions to fuzz (e.g., .aspx,.asp,.config,.txt,.bak,.xml)'
        required: false
        type: string

jobs:
  ffuf-fuzzing:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq libpcap-dev
          
          if [ ! -f "${{ github.event.inputs.wordlist }}" ]; then
            echo "ERROR: Wordlist ${{ github.event.inputs.wordlist }} not found in repository!"
            exit 1
          fi

      - name: Install Go Tools
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install github.com/ffuf/ffuf/v2@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Prepare Direct Live URLs (Skips Subfinder/Httpx)
        env:
          INPUT_LIVE_URLS: ${{ github.event.inputs.live_urls }}
        run: |
          if [ -n "$INPUT_LIVE_URLS" ]; then
            echo "Direct URLs provided. Organizing and skipping Subfinder/Httpx..."
            touch raw_direct_urls.txt
            
            # Fix mashed URLs by adding newlines before http:// or https://
            echo "$INPUT_LIVE_URLS" | sed 's/https:/\nhttps:/g' | sed 's/http:/\nhttp:/g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' | sort -u > raw_direct_urls.txt
          
            # Group them by domain for the separate txt files
            while IFS= read -r url; do
              if [ -z "$url" ]; then continue; fi
              # Extract the domain from the URL (e.g., http://sub.jf.com/path -> sub.jf.com)
              domain=$(echo "$url" | awk -F[/:] '{print $4}')
              safe_name=$(echo "$domain" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c 1-50)
              
              # Append URL to the domain's specific live file
              echo "$url" >> "${{ github.workspace }}/${safe_name}_live.txt"
            done < raw_direct_urls.txt
          else
            echo "No direct URLs provided. Will use Subfinder/Httpx."
          fi

      - name: Prepare Domain Targets
        env:
          INPUT_PROMPTS: ${{ github.event.inputs.domains }}
          INPUT_FILE: ${{ github.event.inputs.file_path }}
        run: |
          touch targets.txt
          if [ -n "$INPUT_PROMPTS" ]; then
            echo "$INPUT_PROMPTS" | tr '/' '\n' | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          if [ -n "$INPUT_FILE" ] && [ -f "$INPUT_FILE" ]; then
            cat "$INPUT_FILE" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          sort -u targets.txt -o targets.txt

      - name: Notify Telegram Start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          WORDLIST="${{ github.event.inputs.wordlist }}"
          EXT_INPUT="${{ github.event.inputs.extensions }}"
          EXT_MSG=""
          if [ -n "$EXT_INPUT" ]; then
            EXT_MSG=$'\n'"Extensions: ${EXT_INPUT}"
          fi

          if [ -n "${{ github.event.inputs.live_urls }}" ]; then
            MESSAGE="🔫 FFUF Pipeline Starting"$'\n'$'\n'"Mode: Direct URLs (Skipping Subfinder/Httpx)"$'\n'"Wordlist: ${WORDLIST}${EXT_MSG}"
          else
            TARGET_COUNT=$(wc -l < targets.txt | xargs)
            MESSAGE="🔫 FFUF Pipeline Starting"$'\n'$'\n'"Mode: Full Scan (Subfinder -> Httpx -> FFUF)"$'\n'"Domains: ${TARGET_COUNT}"$'\n'"Wordlist: ${WORDLIST}${EXT_MSG}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" || true

      - name: Step 1 - Run Subfinder
        if: github.event.inputs.live_urls == ''
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TARGET_FILE="${{ github.workspace }}/targets.txt"
          while IFS= read -r target; do
            if [ -z "$target" ]; then continue; fi
            safe_name=$(echo "$target" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c 1-50)
            SUBS="${{ github.workspace }}/${safe_name}_subs.txt"
            
            echo ">>> RUNNING SUBFINDER FOR $target"
            subfinder -d "$target" -o "$SUBS" || true
            touch "$SUBS"
            
            if [ -s "$SUBS" ]; then
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=✅ Step 1: Subfinder finished for ${target}" || true
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                -F chat_id="${TELEGRAM_CHAT_ID}" \
                -F document="@${SUBS}" \
                -F caption="📄 Subdomains - ${target}" || true
            else
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=⚠️ Step 1: Subfinder found 0 subs for ${target}." || true
            fi
          done < "$TARGET_FILE"

      - name: Step 2 - Run Httpx
        if: github.event.inputs.live_urls == ''
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TARGET_FILE="${{ github.workspace }}/targets.txt"
          while IFS= read -r target; do
            if [ -z "$target" ]; then continue; fi
            safe_name=$(echo "$target" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c 1-50)
            SUBS="${{ github.workspace }}/${safe_name}_subs.txt"
            LIVE="${{ github.workspace }}/${safe_name}_live.txt"
            
            echo ">>> RUNNING HTTPX FOR $target"
            if [ -s "$SUBS" ]; then
              cat "$SUBS" | httpx -silent > "$LIVE" || true
            else
              touch "$LIVE"
            fi
            touch "$LIVE"
            
            if [ -s "$LIVE" ]; then
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=✅ Step 2: Httpx found live URLs for ${target}" || true
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                -F chat_id="${TELEGRAM_CHAT_ID}" \
                -F document="@${LIVE}" \
                -F caption="📄 Live URLs - ${target}" || true
            else
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=⚠️ Step 2: Httpx found 0 live URLs for ${target}." || true
            fi
          done < "$TARGET_FILE"

      - name: Step 3 - Run FFUF
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORDLIST_INPUT: ${{ github.event.inputs.wordlist }}
          EXTENSIONS_INPUT: ${{ github.event.inputs.extensions }}
        run: |
          WORDLIST="${{ github.workspace }}/${WORDLIST_INPUT}"
          
          # Prepare -e flag if extensions are provided
          EXT_FLAGS=""
          if [ -n "$EXTENSIONS_INPUT" ]; then
            EXT_FLAGS="-e ${EXTENSIONS_INPUT}"
            echo "Extensions enabled: ${EXTENSIONS_INPUT}"
          fi
          
          # Find ALL live URL files (works for both Direct URLs and Httpx generated ones)
          for LIVE_FILE in ${{ github.workspace }}/*_live.txt; do
            if [ ! -f "$LIVE_FILE" ]; then continue; fi
            
            echo ">>> Found live file: $LIVE_FILE"
            
            # Loop through each live subdomain URL in the file
            while IFS= read -r url; do
              if [ -z "$url" ]; then continue; fi
              
              # Create safe filenames based on the URL
              url_safe_name=$(echo "$url" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c 1-70)
              FFUF_RAW="${{ github.workspace }}/${url_safe_name}_raw.txt"
              FFUF_CLEAN="${{ github.workspace }}/${url_safe_name}_clean.txt"
              TEMP_JSON="${{ github.workspace }}/${url_safe_name}_temp.json"
              
              # Remove trailing slash for clean fuzzing
              clean_url=$(echo "$url" | sed 's:/*$::')
              echo ">>> Fuzzing subdomain: ${clean_url}"
              echo ">>> Output is being saved directly to ${FFUF_RAW} to prevent GitHub log limits."
              
              # FIXED: Redirect all output to the file directly.
              # Using `tee` prints 100,000+ lines to the GitHub log, which hits the 25MB limit and GitHub cancels the job.
              ffuf -u "${clean_url}/FUZZ" -w "$WORDLIST" -mc 200-500 -fc 404 -v ${EXT_FLAGS} -o "$TEMP_JSON" -of json > "$FFUF_RAW" 2>&1 || true
              
              # Extract clean organized list from JSON (URL + Status Code)
              if [ -f "$TEMP_JSON" ] && [ -s "$TEMP_JSON" ]; then
                jq -r '.results[] | "\(.url) status code : \(.status)"' "$TEMP_JSON" > "$FFUF_CLEAN"
                rm -f "$TEMP_JSON"
              else
                touch "$FFUF_CLEAN"
              fi
              
              # Send the raw txt file (ASCII art + progress)
              if [ -f "$FFUF_RAW" ] && [ -s "$FFUF_RAW" ]; then
                curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                  -F chat_id="${TELEGRAM_CHAT_ID}" \
                  -F document="@${FFUF_RAW}" \
                  -F caption="🔫 FFUF Raw Output - ${url_safe_name}" || true
              fi
              
              # Send the clean organized txt file (URL status code : XXX)
              if [ -f "$FFUF_CLEAN" ] && [ -s "$FFUF_CLEAN" ]; then
                curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                  -d chat_id="${TELEGRAM_CHAT_ID}" \
                  --data-urlencode "text=✅ Extracted Clean Results for ${clean_url}" || true
                curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                  -F chat_id="${TELEGRAM_CHAT_ID}" \
                  -F document="@${FFUF_CLEAN}" \
                  -F caption="🎯 Clean Organized Results - ${url_safe_name}" || true
              else
                curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                  -d chat_id="${TELEGRAM_CHAT_ID}" \
                  --data-urlencode "text=⚠️ FFUF finished but found 0 valid paths for ${clean_url}." || true
              fi
              
            done < "$LIVE_FILE"
          done

      - name: Pipeline Finished
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=🛑 FFUF Pipeline Completely Finished" || true
