name: FFUF Fuzzing Pipeline

on:
  workflow_dispatch:
    inputs:
      domains:
        description: 'Domains separated by / (e.g., f.com/j.com/x.com)'
        required: false
        type: string
      file_path:
        description: 'Path to a domains .txt file in repo (one per line)'
        required: false
        type: string
      wordlist:
        description: 'Path to the wordlist in repo (e.g., test.txt)'
        required: true
        default: 'test.txt'

jobs:
  ffuf-fuzzing:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq libpcap-dev
          
          if [ ! -f "${{ github.event.inputs.wordlist }}" ]; then
            echo "ERROR: Wordlist ${{ github.event.inputs.wordlist }} not found in repository!"
            exit 1
          fi

      - name: Install Go Tools
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install github.com/ffuf/ffuf/v2@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Prepare Targets
        env:
          INPUT_PROMPTS: ${{ github.event.inputs.domains }}
          INPUT_FILE: ${{ github.event.inputs.file_path }}
        run: |
          touch targets.txt
          if [ -n "$INPUT_PROMPTS" ]; then
            echo "$INPUT_PROMPTS" | tr '/' '\n' | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          if [ -n "$INPUT_FILE" ] && [ -f "$INPUT_FILE" ]; then
            cat "$INPUT_FILE" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          sort -u targets.txt -o targets.txt
          TARGET_COUNT=$(wc -l < targets.txt | xargs)
          echo "Total domains loaded: ${TARGET_COUNT}"

      - name: Notify Telegram Start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TARGET_COUNT=$(wc -l < targets.txt | xargs)
          WORDLIST="${{ github.event.inputs.wordlist }}"
          MESSAGE="🔫 FFUF Fuzzing Pipeline Starting"$'\n'$'\n'"Domains: ${TARGET_COUNT}"$'\n'"Wordlist: ${WORDLIST}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" || true

      - name: Step 1 - Run Subfinder
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TARGET_FILE="${{ github.workspace }}/targets.txt"
          while IFS= read -r target; do
            if [ -z "$target" ]; then continue; fi
            safe_name=$(echo "$target" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c 1-50)
            SUBS="${{ github.workspace }}/${safe_name}_subs.txt"
            
            echo ">>> RUNNING SUBFINDER FOR $target"
            subfinder -d "$target" -o "$SUBS" || true
            touch "$SUBS"
            
            if [ -s "$SUBS" ]; then
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=✅ Step 1: Subfinder finished for ${target}" || true
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                -F chat_id="${TELEGRAM_CHAT_ID}" \
                -F document="@${SUBS}" \
                -F caption="📄 Subdomains - ${target}" || true
            else
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=⚠️ Step 1: Subfinder found 0 subs for ${target}." || true
            fi
          done < "$TARGET_FILE"

      - name: Step 2 - Run Httpx
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TARGET_FILE="${{ github.workspace }}/targets.txt"
          while IFS= read -r target; do
            if [ -z "$target" ]; then continue; fi
            safe_name=$(echo "$target" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c 1-50)
            SUBS="${{ github.workspace }}/${safe_name}_subs.txt"
            LIVE="${{ github.workspace }}/${safe_name}_live.txt"
            
            echo ">>> RUNNING HTTPX FOR $target"
            if [ -s "$SUBS" ]; then
              cat "$SUBS" | httpx -silent > "$LIVE" || true
            else
              touch "$LIVE"
            fi
            touch "$LIVE"
            
            if [ -s "$LIVE" ]; then
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=✅ Step 2: Httpx found live URLs for ${target}" || true
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                -F chat_id="${TELEGRAM_CHAT_ID}" \
                -F document="@${LIVE}" \
                -F caption="📄 Live URLs - ${target}" || true
            else
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=⚠️ Step 2: Httpx found 0 live URLs for ${target}." || true
            fi
          done < "$TARGET_FILE"

      - name: Step 3 - Run FFUF
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORDLIST_INPUT: ${{ github.event.inputs.wordlist }}
        run: |
          TARGET_FILE="${{ github.workspace }}/targets.txt"
          WORDLIST="${{ github.workspace }}/${WORDLIST_INPUT}"
          
          while IFS= read -r target; do
            if [ -z "$target" ]; then continue; fi
            safe_name=$(echo "$target" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c 1-50)
            LIVE="${{ github.workspace }}/${safe_name}_live.txt"
            
            echo ">>> RUNNING FFUF FOR $target"
            if [ ! -s "$LIVE" ]; then
              echo "No live URLs to fuzz for $target"
              continue
            fi
            
            # Loop through each live subdomain URL
            while IFS= read -r url; do
              if [ -z "$url" ]; then continue; fi
              
              # Create safe filenames
              url_safe_name=$(echo "$url" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c 1-70)
              FFUF_RAW="${{ github.workspace }}/${url_safe_name}_raw.txt"
              FFUF_CLEAN="${{ github.workspace }}/${url_safe_name}_clean.txt"
              TEMP_JSON="${{ github.workspace }}/${url_safe_name}_temp.json"
              
              # Remove trailing slash for clean fuzzing
              clean_url=$(echo "$url" | sed 's:/*$::')
              echo ">>> Fuzzing subdomain: ${clean_url}"
              
              # Run FFUF with -v, saving raw terminal output and a hidden JSON file
              ffuf -u "${clean_url}/FUZZ" -w "$WORDLIST" -mc 200-500 -fc 404 -v -o "$TEMP_JSON" -of json 2>&1 | tee "$FFUF_RAW" || true
              
              # Extract clean organized list from JSON (URL + Status Code)
              if [ -f "$TEMP_JSON" ] && [ -s "$TEMP_JSON" ]; then
                jq -r '.results[] | "\(.url) status code : \(.status)"' "$TEMP_JSON" > "$FFUF_CLEAN"
                rm -f "$TEMP_JSON"
              else
                touch "$FFUF_CLEAN"
              fi
              
              # Send the raw txt file (ASCII art + progress)
              if [ -f "$FFUF_RAW" ] && [ -s "$FFUF_RAW" ]; then
                curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                  -F chat_id="${TELEGRAM_CHAT_ID}" \
                  -F document="@${FFUF_RAW}" \
                  -F caption="🔫 FFUF Raw Output - ${url_safe_name}" || true
              fi
              
              # Send the clean organized txt file (URL status code : XXX)
              if [ -f "$FFUF_CLEAN" ] && [ -s "$FFUF_CLEAN" ]; then
                curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                  -d chat_id="${TELEGRAM_CHAT_ID}" \
                  --data-urlencode "text=✅ Extracted Clean Results for ${clean_url}" || true
                curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                  -F chat_id="${TELEGRAM_CHAT_ID}" \
                  -F document="@${FFUF_CLEAN}" \
                  -F caption="🎯 Clean Organized Results - ${url_safe_name}" || true
              else
                curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                  -d chat_id="${TELEGRAM_CHAT_ID}" \
                  --data-urlencode "text=⚠️ FFUF finished but found 0 valid paths for ${clean_url}." || true
              fi
              
            done < "$LIVE"
          done < "$TARGET_FILE"

      - name: Pipeline Finished
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=🛑 FFUF Pipeline Completely Finished" || true
