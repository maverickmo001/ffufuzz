name: FFUF Fuzzing Pipeline

on:
  workflow_dispatch:
    inputs:
      domains:
        description: 'Domains separated by / (e.g., f.com/j.com/x.com)'
        required: false
        type: string
      file_path:
        description: 'Path to a domains .txt file in repo (one per line)'
        required: false
        type: string
      wordlist:
        description: 'Path to the wordlist in repo (e.g., test.txt)'
        required: true
        default: 'test.txt'

jobs:
  ffuf-fuzzing:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq libpcap-dev enscript ghostscript zip
          
          if [ ! -f "${{ github.event.inputs.wordlist }}" ]; then
            echo "ERROR: Wordlist ${{ github.event.inputs.wordlist }} not found in repository!"
            exit 1
          fi

      - name: Install Go Tools
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install github.com/ffuf/ffuf/v2@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Prepare Targets
        env:
          INPUT_PROMPTS: ${{ github.event.inputs.domains }}
          INPUT_FILE: ${{ github.event.inputs.file_path }}
        run: |
          touch targets.txt
          if [ -n "$INPUT_PROMPTS" ]; then
            echo "$INPUT_PROMPTS" | tr '/' '\n' | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          if [ -n "$INPUT_FILE" ] && [ -f "$INPUT_FILE" ]; then
            cat "$INPUT_FILE" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' >> targets.txt
          fi
          sort -u targets.txt -o targets.txt
          TARGET_COUNT=$(wc -l < targets.txt | xargs)
          echo "Total domains loaded: ${TARGET_COUNT}"

      - name: Notify Telegram Start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TARGET_COUNT=$(wc -l < targets.txt | xargs)
          WORDLIST="${{ github.event.inputs.wordlist }}"
          MESSAGE="🔫 FFUF Fuzzing Pipeline Starting"$'\n'$'\n'"Domains: ${TARGET_COUNT}"$'\n'"Wordlist: ${WORDLIST}"$'\n'"Filter: 200-500 Status (Excluding 404)"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" || true

      - name: Step 1 - Run Subfinder
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TARGET_FILE="${{ github.workspace }}/targets.txt"
          while IFS= read -r target; do
            if [ -z "$target" ]; then continue; fi
            safe_name=$(echo "$target" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c 1-50)
            SUBS="${{ github.workspace }}/${safe_name}_subs.txt"
            
            echo ">>> RUNNING SUBFINDER FOR $target"
            subfinder -d "$target" -o "$SUBS" || true
            touch "$SUBS"
            
            if [ -s "$SUBS" ]; then
              enscript -p "${safe_name}_subs.ps" "$SUBS" || true
              ps2pdf "${safe_name}_subs.ps" "${safe_name}_subs.pdf" || true
              
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=✅ Step 1: Subfinder finished for ${target}" || true
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                -F chat_id="${TELEGRAM_CHAT_ID}" \
                -F document="@${SUBS}" \
                -F caption="📄 Subdomains - ${target}" || true
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                -F chat_id="${TELEGRAM_CHAT_ID}" \
                -F document="@${safe_name}_subs.pdf" \
                -F caption="📑 Subdomains PDF - ${target}" || true
            else
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=⚠️ Step 1: Subfinder found 0 subs for ${target}." || true
            fi
          done < "$TARGET_FILE"

      - name: Step 2 - Run Httpx
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TARGET_FILE="${{ github.workspace }}/targets.txt"
          while IFS= read -r target; do
            if [ -z "$target" ]; then continue; fi
            safe_name=$(echo "$target" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c 1-50)
            SUBS="${{ github.workspace }}/${safe_name}_subs.txt"
            LIVE="${{ github.workspace }}/${safe_name}_live.txt"
            
            echo ">>> RUNNING HTTPX FOR $target"
            if [ -s "$SUBS" ]; then
              cat "$SUBS" | httpx -silent > "$LIVE" || true
            else
              touch "$LIVE"
            fi
            touch "$LIVE"
            
            if [ -s "$LIVE" ]; then
              enscript -p "${safe_name}_live.ps" "$LIVE" || true
              ps2pdf "${safe_name}_live.ps" "${safe_name}_live.pdf" || true
              
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=✅ Step 2: Httpx found live URLs for ${target}" || true
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                -F chat_id="${TELEGRAM_CHAT_ID}" \
                -F document="@${LIVE}" \
                -F caption="📄 Live URLs - ${target}" || true
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                -F chat_id="${TELEGRAM_CHAT_ID}" \
                -F document="@${safe_name}_live.pdf" \
                -F caption="📑 Live URLs PDF - ${target}" || true
            else
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=⚠️ Step 2: Httpx found 0 live URLs for ${target}." || true
            fi
          done < "$TARGET_FILE"

      - name: Step 3 - Run FFUF
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORDLIST_INPUT: ${{ github.event.inputs.wordlist }}
        run: |
          TARGET_FILE="${{ github.workspace }}/targets.txt"
          WORDLIST="${{ github.workspace }}/${WORDLIST_INPUT}"
          
          while IFS= read -r target; do
            if [ -z "$target" ]; then continue; fi
            safe_name=$(echo "$target" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c 1-50)
            LIVE="${{ github.workspace }}/${safe_name}_live.txt"
            FFUF_OUT="${{ github.workspace }}/${safe_name}_ffuf.txt"
            FFUF_HTML="${{ github.workspace }}/${safe_name}_ffuf.html"
            FFUF_PDF="${{ github.workspace }}/${safe_name}_ffuf.pdf"
            FFUF_ZIP="${{ github.workspace }}/${safe_name}_ffuf.zip"
            
            echo ">>> RUNNING FFUF FOR $target"
            if [ ! -s "$LIVE" ]; then
              echo "No live URLs to fuzz for $target"
              continue
            fi
            
            # Create empty clean output file
            > "$FFUF_OUT"
            
            # Loop through each live URL
            while IFS= read -r url; do
              if [ -z "$url" ]; then continue; fi
              
              # Remove trailing slash for clean fuzzing
              clean_url=$(echo "$url" | sed 's:/*$::')
              echo "Fuzzing: ${clean_url}/FUZZ"
              
              # Run FFUF silently, output to JSON to avoid terminal junk
              ffuf -u "${clean_url}/FUZZ" -w "$WORDLIST" -mc 200-500 -fc 404 -t 50 -rate 100 -ac -maxtime 300 -o "ffuf_temp.json" -of json -silent 2>/dev/null || true
              
              # Extract ONLY the clean working URLs from the JSON and append to our final list
              if [ -f "ffuf_temp.json" ] && [ -s "ffuf_temp.json" ]; then
                jq -r '.results[]? | .url // empty' "ffuf_temp.json" >> "$FFUF_OUT"
              fi
              
              # Clean up temp file for next loop
              rm -f "ffuf_temp.json"
              
            done < "$LIVE"
            
            # Remove duplicate URLs
            if [ -s "$FFUF_OUT" ]; then
              sort -u "$FFUF_OUT" -o "$FFUF_OUT"
            fi
            
            # Generate Reports
            if [ -s "$FFUF_OUT" ]; then
              # Create HTML Report with clickable links
              echo "<html><head><title>FFUF Report - ${target}</title><style>body{font-family:Arial;background:#f4f4f4;padding:20px}a{color:#007BFF;text-decoration:none;font-size:16px}a:hover{text-decoration:underline}</style></head><body>" > "$FFUF_HTML"
              echo "<h1>FFUF Fuzzing Report for ${target}</h1>" >> "$FFUF_HTML"
              echo "<h3>Filter: Status 200-500 (Excluding 404) | Wordlist: ${WORDLIST_INPUT}</h3>" >> "$FFUF_HTML"
              
              while IFS= read -r found_url; do
                echo "<p><a href='${found_url}'>${found_url}</a></p>" >> "$FFUF_HTML"
              done < "$FFUF_OUT"
              
              echo "</body></html>" >> "$FFUF_HTML"
              
              # Create PDF
              enscript -p "${safe_name}_ffuf.ps" "$FFUF_OUT" || true
              ps2pdf "${safe_name}_ffuf.ps" "$FFUF_PDF" || true
              
              # Zip all formats
              zip -r "$FFUF_ZIP" "$FFUF_OUT" "$FFUF_HTML" "$FFUF_PDF" || true
            fi

            # Send to Telegram
            if [ -f "$FFUF_ZIP" ] && [ -s "$FFUF_ZIP" ]; then
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=🚨 Step 3: FFUF found working paths for ${target}!" || true
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                -F chat_id="${TELEGRAM_CHAT_ID}" \
                -F document="@${FFUF_ZIP}" \
                -F caption="🔫 FFUF Clean Results (TXT, HTML, PDF) - ${target}" || true
            else
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=✅ Step 3: FFUF finished but found 0 valid paths for ${target}." || true
            fi
          done < "$TARGET_FILE"

      - name: Pipeline Finished
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=🛑 FFUF Pipeline Completely Finished" || true
